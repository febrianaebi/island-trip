<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Island Trip</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#fff0f5;
overflow:hidden;
}

h1{
margin-top:80px;
font-size:40px;
}

button{
padding:15px 30px;
font-size:20px;
margin:20px;
border:none;
border-radius:12px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#aaa;
color:white;
position:absolute;
}

.heart{
position:fixed;
font-size:25px;
animation:heart 4s linear infinite;
}

@keyframes heart{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

.plane{
position:fixed;
top:20%;
left:-200px;
font-size:40px;
animation:planeFly 12s linear infinite;
}

@keyframes planeFly{
0%{left:-200px}
100%{left:110%}
}

.sad{
position:fixed;
font-size:35px;
animation:sadFall 4s linear infinite;
}

@keyframes sadFall{
0%{top:-10%}
100%{top:110%}
}

/* ISLAND */

#islandScene{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
background-size:cover;
background-position:center;
}

/* WAVES */

.wave{
position:absolute;
bottom:0;
width:200%;
height:180px;
background:rgba(255,255,255,0.35);
border-radius:40%;
animation:wave 10s linear infinite;
}

.wave2{
animation-duration:14s;
opacity:0.4;
bottom:20px;
}

.wave3{
animation-duration:18s;
opacity:0.3;
bottom:40px;
}

@keyframes wave{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* SUN */

.sun{
position:absolute;
width:120px;
height:120px;
background:radial-gradient(circle,#ffd54f,#ff9800);
border-radius:50%;
top:20%;
left:50%;
transform:translateX(-50%);
animation:sunset 10s forwards;
}

@keyframes sunset{
0%{top:15%}
100%{top:60%}
}

/* PALM */

.palm{
position:absolute;
bottom:120px;
left:20%;
font-size:80px;
animation:palm 3s ease-in-out infinite;
}

@keyframes palm{
0%{transform:rotate(-3deg)}
50%{transform:rotate(3deg)}
100%{transform:rotate(-3deg)}
}

/* BIRD */

.bird{
position:absolute;
top:20%;
left:-50px;
font-size:30px;
animation:bird 12s linear infinite;
}

@keyframes bird{
0%{left:-50px}
100%{left:110%}
}

/* CONFETTI */

.confetti{
position:fixed;
font-size:25px;
animation:confetti 4s linear infinite;
}

@keyframes confetti{
0%{top:-10%}
100%{top:110%}
}

</style>
</head>

<body>

<h1 id="question">Will you go to island with me?</h1>

<button id="yes">YES</button>
<button id="no">NO</button>

<div class="plane">✈️</div>

<div id="islandScene">

<div class="sun"></div>

<div class="wave"></div>
<div class="wave wave2"></div>
<div class="wave wave3"></div>

<div class="palm">🌴</div>

<div class="bird">🐦</div>

<h1 style="margin-top:100px;color:white;">
Pack your bag, we're going to island 🏝
</h1>

</div>

<script>

const noBtn=document.getElementById("no")
const yesBtn=document.getElementById("yes")
const island=document.getElementById("islandScene")

let scale=1

noBtn.addEventListener("mouseover",()=>{

noBtn.style.top=Math.random()*window.innerHeight+"px"
noBtn.style.left=Math.random()*window.innerWidth+"px"

scale+=0.2
yesBtn.style.transform="scale("+scale+")"

for(let i=0;i<3;i++){
let sad=document.createElement("div")
sad.className="sad"
sad.innerHTML="😢"
sad.style.left=Math.random()*100+"%"
document.body.appendChild(sad)

setTimeout(()=>sad.remove(),4000)
}

})

yesBtn.addEventListener("click",()=>{

document.body.innerHTML=""

document.body.appendChild(island)

island.style.display="block"

for(let i=0;i<30;i++){

let confetti=document.createElement("div")
confetti.className="confetti"
confetti.innerHTML="🎉"
confetti.style.left=Math.random()*100+"%"
document.body.appendChild(confetti)

}

})

/* hearts */

setInterval(()=>{

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"%"
document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)

},800)

</script>

</body>
</html>
