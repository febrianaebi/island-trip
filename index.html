<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Island Trip</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#fff0f5;
overflow:hidden;
}

h1{
margin-top:80px;
font-size:36px;
}

button{
padding:15px 30px;
font-size:20px;
margin:15px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#888;
color:white;
position:relative;
}

/* hearts */

.heart{
position:fixed;
font-size:22px;
animation:heart 4s linear infinite;
}

@keyframes heart{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

/* sad */

.sad{
position:fixed;
font-size:32px;
animation:sad 4s linear infinite;
}

@keyframes sad{
0%{top:-10%}
100%{top:110%}
}

/* island */

#island{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
background-size:cover;
background-position:center;
color:white;
}

/* waves */

.wave{
position:absolute;
bottom:0;
width:200%;
height:180px;
background:rgba(255,255,255,0.35);
border-radius:40%;
animation:wave 10s linear infinite;
}

.wave2{
animation-duration:14s;
opacity:0.4;
bottom:20px;
}

.wave3{
animation-duration:18s;
opacity:0.3;
bottom:40px;
}

@keyframes wave{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* plane */

.plane{
position:absolute;
top:25%;
left:-200px;
font-size:50px;
animation:fly 10s linear forwards;
}

@keyframes fly{
0%{left:-200px}
100%{left:110%}
}

.finalText{
position:absolute;
top:40%;
width:100%;
font-size:48px;
font-weight:bold;
text-shadow:0 0 10px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<h1 id="text">Would you take me on a trip to an island?</h1>

<div id="buttons">
<button id="yes">Yes</button>
<button id="no">No</button>
</div>

<div id="island">

<div class="wave"></div>
<div class="wave wave2"></div>
<div class="wave wave3"></div>

<div class="plane">✈️</div>

<div class="finalText">
Destination: Us 🏝
</div>

</div>

<script>

let stage=1
let yesSize=1

const text=document.getElementById("text")
const yes=document.getElementById("yes")
const no=document.getElementById("no")
const island=document.getElementById("island")

yes.onclick=()=>{

if(stage===1){
text.innerText="try saying no first. I bet you want to know what happens"
stage=2
}

else if(stage===2){
text.innerText="go on, hit no… just once"
stage=3
}

else if(stage===3){
text.innerText="you're missing out"
stage=4
}

else if(stage===4){
text.innerText="click no… I dare you"
stage=5
}

else if(stage===9){

showIsland()
}

growYes()

}

no.onclick=()=>{

if(stage===5){
text.innerText="Are you positive?"
stage=6
}

else if(stage===6){
text.innerText="Baby please…"
no.innerText="No"
stage=7
}

else if(stage===7){
text.innerText="If you say no I will be really sad"
stage=8
}

else if(stage===8){
text.innerText="I will be very sad"
stage=9

yes.innerText="Yes"
no.innerText="Please???"

yesSize+=0.6
yes.style.transform="scale("+yesSize+")"
}

sadAnim()

}

/* runaway button */

no.addEventListener("mouseover",()=>{

if(no.innerText==="Please???"){

no.style.position="absolute"
no.style.top=Math.random()*window.innerHeight+"px"
no.style.left=Math.random()*window.innerWidth+"px"

}

})

function growYes(){

yesSize+=0.25
yes.style.transform="scale("+yesSize+")"

sadAnim()

}

function sadAnim(){

for(let i=0;i<3;i++){

let sad=document.createElement("div")
sad.className="sad"
sad.innerHTML="😢"
sad.style.left=Math.random()*100+"%"
document.body.appendChild(sad)

setTimeout(()=>sad.remove(),4000)

}

}

function showIsland(){

document.body.innerHTML=""
document.body.appendChild(island)

island.style.display="block"

}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"%"
document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)

},900)

</script>

</body>
</html>
