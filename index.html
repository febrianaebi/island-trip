<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Chat Buttons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #fdf6e3;
      text-align: center;
    }
    #chat {
      margin-bottom: 30px;
      font-size: 1.2rem;
    }
    .btn-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #ffcc00;
      transition: all 0.2s;
    }
    button:hover {
      background-color: #ffaa00;
    }
    #yes-big {
      font-size: 2rem;
      padding: 20px 40px;
      margin-top: 20px;
    }
    #please-blur {
      font-size: 1.5rem;
      padding: 20px 40px;
      margin-top: 20px;
      filter: blur(3px);
    }
  </style>
</head>
<body>

  <div id="chat">Awal</div>
  <div class="btn-container" id="buttons">
    <button id="btn1">Yes</button>
    <button id="btn2">No</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const buttons = document.getElementById('buttons');

    let step = 0;

    function renderStep() {
      buttons.innerHTML = "";

      switch(step) {
        case 0: // Awal
          chat.textContent = "Awal";
          createButton("Yes", () => { step = 1; renderStep(); });
          createButton("No", () => { step = 0; renderStep(); }); // tetap di awal kalau No
          break;

        case 1: // Klik Yes → try saying no first
          chat.textContent = "try saying no first. I bet you want to know what happens";
          createButton("Yes", () => { step = 2; renderStep(); });
          createButton("No", () => { step = 5; renderStep(); }); // langsung lompat ke Yes | Are you positive?
          break;

        case 2: // klik Yes → go on, hit no… just once
          chat.textContent = "go on, hit no… just once";
          createButton("Yes", () => { step = 3; renderStep(); });
          break;

        case 3: // klik Yes → you're missing out
          chat.textContent = "you're missing out";
          createButton("Yes", () => { step = 4; renderStep(); });
          break;

        case 4: // klik Yes → click no… I dare you
          chat.textContent = "click no… I dare you";
          createButton("Yes", () => { step = 5; renderStep(); });
          break;

        case 5: // Yes | Are you positive?
          chat.textContent = "Tombol berubah jadi:";
          createButton("Yes", () => { step = 6; renderStep(); });
          createButton("Are you positive?", () => { step = 7; renderStep(); });
          break;

        case 6: // Yes | Baby please…
          chat.textContent = "Tombol berubah:";
          createButton("Yes", () => { step = 8; renderStep(); });
          createButton("Baby please…", () => { step = 8; renderStep(); });
          break;

        case 7: // If you say no I will be really sad
          chat.textContent = "";
          createButton("Yes", () => { step = 9; renderStep(); });
          createButton("If you say no I will be really sad", () => { step = 9; renderStep(); });
          break;

        case 8: // I will be very sad
          chat.textContent = "";
          createButton("Yes", () => { step = 10; renderStep(); });
          createButton("I will be very sad", () => { step = 10; renderStep(); });
          break;

        case 9: // YES besar | Please??? kabur
          chat.textContent = "";
          createButton("YES (lebih besar)", () => { step = 10; renderStep(); }, "yes-big");
          createButton("Please??? (kabur)", () => { step = 10; renderStep(); }, "please-blur");
          break;

        case 10: // Ending
          chat.textContent = "Ending pulau 🌴";
          break;

      }
    }

    function createButton(text, onClick, id = "") {
      const btn = document.createElement('button');
      btn.textContent = text;
      if(id) btn.id = id;
      btn.addEventListener('click', onClick);
      buttons.appendChild(btn);
    }

    renderStep();
  </script>

</body>
</html>
