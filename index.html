<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Trip? 🌴</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
    overflow: hidden;
}

h1 {
    margin-top: 80px;
    font-size: 2.2em;
    color: #ff4f81;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 15px;
    transition: 0.3s;
}

#yesBtn {
    background-color: #ff4f81;
    color: white;
}

#noBtn {
    background-color: white;
}

#message {
    margin-top: 25px;
    font-size: 20px;
    color: #ff4f81;
}

.heart, .confetti {
    position: absolute;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
}

.plane {
    position: absolute;
    font-size: 28px;
    animation: fly 8s linear infinite;
}

@keyframes fly {
    0% { left: -10%; top: 20%; }
    100% { left: 110%; top: 25%; }
}
</style>
</head>

<body>

<!-- Background music -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/76xtedFgWTA?autoplay=1&loop=1&playlist=76xtedFgWTA"
frameborder="0" allow="autoplay"></iframe>

<h1>Would you take me on a trip to an island? 🌴✈️</h1>

<div id="buttons">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
</div>

<div id="message"></div>

<script>
let yesCount = 0;
let size = 18;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");
const buttonsDiv = document.getElementById("buttons");

startHearts();
startPlane();

yesBtn.addEventListener("click", () => {
    yesCount++;
    size += 8;
    yesBtn.style.fontSize = size + "px";

    if (yesCount === 1) {
        message.innerText = "try saying no first. I bet you want to know what happens";
    } else if (yesCount === 2) {
        message.innerText = "go on, hit no… just once";
    } else if (yesCount === 3) {
        message.innerText = "you’re missing out";
    } else if (yesCount === 4) {
        message.innerText = "click no… I dare you";
    } else if (yesCount >= 5) {
        ending();
    }
});

noBtn.addEventListener("click", () => {
    buttonsDiv.innerHTML = `
        <button onclick="chooseYes()">yes</button>
        <button onclick="choosePositive()">are you positive?</button>
    `;
});

function chooseYes() {
    ending();
}

function choosePositive() {
    buttonsDiv.innerHTML = `
        <button onclick="chooseYes()">yes</button>
        <button onclick="choosePookie()">pookie please…</button>
    `;
}

function choosePookie() {
    buttonsDiv.innerHTML = `
        <button onclick="chooseYes()">yes</button>
        <button onclick="chooseSad()">if you say no, i will be ready sad</button>
    `;
}

function chooseSad() {
    buttonsDiv.innerHTML = `
        <button style="font-size:24px;" onclick="chooseYes()">yes</button>
        <button onclick="chooseVerySad()">i will be very sad</button>
    `;
}

function chooseVerySad() {
    buttonsDiv.innerHTML = `
        <button style="font-size:30px;" onclick="chooseYes()">yes</button>
        <button onclick="choosePlease()">please???</button>
    `;
}

function choosePlease() {
    buttonsDiv.innerHTML = `
        <button style="font-size:38px;" onclick="chooseYes()">YES 😭🌴</button>
    `;
}

function ending() {
    message.innerText = "Pack your bag, we’re going to island 🌴✈️";
    buttonsDiv.innerHTML = "";
    startConfetti();
}

function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 400);
}

function startPlane() {
    setInterval(() => {
        const plane = document.createElement("div");
        plane.classList.add("plane");
        plane.innerHTML = "✈️";
        document.body.appendChild(plane);

        setTimeout(() => plane.remove(), 8000);
    }, 5000);
}

function startConfetti() {
    setInterval(() => {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.innerHTML = "🎉";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 5000);
    }, 200);
}
</script>

</body>
</html>
