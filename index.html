<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Trip? 🌴</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(to bottom,#a1c4fd,#c2e9fb);
overflow:hidden;
}

h1{
margin-top:80px;
font-size:2.2em;
color:#ff4f81;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
margin:15px;
transition:0.3s;
}

#yesBtn{
background:#ff4f81;
color:white;
}

#noBtn{
background:white;
}

#message{
margin-top:25px;
font-size:20px;
color:#ff4f81;
}

.heart{
position:absolute;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

.plane{
position:absolute;
font-size:28px;
animation:fly 8s linear infinite;
}

@keyframes fly{
0%{left:-10%;top:20%;}
100%{left:110%;top:25%;}
}

/* Island Ending */

.island-scene{
margin-top:40px;
position:relative;
}

.island-img{
width:80%;
max-width:500px;
border-radius:20px;
}

.destination{
margin-top:15px;
color:white;
font-size:28px;
}

.wave{
position:absolute;
bottom:0;
width:100%;
height:40px;
background:rgba(0,200,255,0.6);
animation:waveMove 3s infinite linear;
border-radius:20px;
}

@keyframes waveMove{
0%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
100%{transform:translateX(-10px);}
}

</style>
</head>

<body>

<!-- music -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/76xtedFgWTA?autoplay=1&loop=1&playlist=76xtedFgWTA"
frameborder="0" allow="autoplay"></iframe>

<h1>Would you take me on a trip to an island? 🌴✈️</h1>

<div id="buttons">
<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>
</div>

<div id="message"></div>

<script>

let yesCount=0
let size=18

const yesBtn=document.getElementById("yesBtn")
const noBtn=document.getElementById("noBtn")
const message=document.getElementById("message")
const buttonsDiv=document.getElementById("buttons")

startHearts()
startPlane()

yesBtn.addEventListener("click",()=>{

yesCount++
size+=8
yesBtn.style.fontSize=size+"px"

if(yesCount===1){
message.innerText="try saying no first. I bet you want to know what happens"
}

else if(yesCount===2){
message.innerText="go on, hit no… just once"
}

else if(yesCount===3){
message.innerText="you’re missing out"
}

else if(yesCount===4){
message.innerText="click no… I dare you"
}

})

noBtn.addEventListener("click",()=>{

buttonsDiv.innerHTML=`
<button onclick="chooseYes()">Yes</button>
<button onclick="choosePositive()">Are you positive?</button>
`

})

function chooseYes(){
ending()
}

function choosePositive(){

buttonsDiv.innerHTML=`
<button onclick="chooseYes()">No</button>
<button onclick="chooseBaby()">Baby please…</button>
`

}

function chooseBaby(){

buttonsDiv.innerHTML=`
<button onclick="chooseYes()">No</button>
<button onclick="chooseSad()">If you say no I will be really sad</button>
`

}

function chooseSad(){

buttonsDiv.innerHTML=`
<button onclick="chooseYes()">No</button>
<button onclick="chooseVerySad()">I will be very sad</button>
`

}

function chooseVerySad(){

buttonsDiv.innerHTML=`
<button style="font-size:26px" onclick="chooseYes()">Yes</button>
<button id="runBtn" onmouseover="runAway()">Please???</button>
`

}

function runAway(){

const btn=document.getElementById("runBtn")

btn.style.position="absolute"
btn.style.left=Math.random()*80+"vw"
btn.style.top=Math.random()*80+"vh"

}

function ending(){

message.innerText="Pack your bag, we’re going to island 🌴✈️"

buttonsDiv.innerHTML=`

<div class="island-scene">

<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
class="island-img">

<div class="wave"></div>

<h2 class="destination">Destination: Us 💙</h2>

</div>

`

}

function startHearts(){

setInterval(()=>{

const heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="💖"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),5000)

},400)

}

function startPlane(){

setInterval(()=>{

const plane=document.createElement("div")
plane.classList.add("plane")
plane.innerHTML="✈️"

document.body.appendChild(plane)

setTimeout(()=>plane.remove(),8000)

},5000)

}

</script>

</body>
</html>
