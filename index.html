<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Island Trip</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#fff0f5;
overflow:hidden;
}

h1{
margin-top:80px;
font-size:38px;
padding:20px;
}

button{
padding:15px 30px;
font-size:20px;
margin:15px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff4d6d;
color:white;
}

#alt{
background:#888;
color:white;
}

.heart{
position:fixed;
font-size:24px;
animation:heart 4s linear infinite;
}

@keyframes heart{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

.plane{
position:fixed;
top:20%;
left:-200px;
font-size:40px;
animation:planeFly 12s linear infinite;
}

@keyframes planeFly{
0%{left:-200px}
100%{left:110%}
}

.sad{
position:fixed;
font-size:35px;
animation:sadFall 4s linear infinite;
}

@keyframes sadFall{
0%{top:-10%}
100%{top:110%}
}

/* ISLAND */

#island{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
background-size:cover;
background-position:center;
color:white;
}

/* WAVES */

.wave{
position:absolute;
bottom:0;
width:200%;
height:180px;
background:rgba(255,255,255,0.35);
border-radius:40%;
animation:wave 10s linear infinite;
}

.wave2{
animation-duration:14s;
opacity:0.4;
bottom:20px;
}

.wave3{
animation-duration:18s;
opacity:0.3;
bottom:40px;
}

@keyframes wave{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

</style>
</head>

<body>

<h1 id="text">Would you take me on a trip to an island?</h1>

<div id="buttons">
<button id="yes">Yes</button>
<button id="alt">No</button>
</div>

<div class="plane">✈️</div>

<div id="island">

<div class="wave"></div>
<div class="wave wave2"></div>
<div class="wave wave3"></div>

<h1 style="margin-top:120px;">
Pack your bag, we're going to the island 🏝
</h1>

</div>

<script>

let step=0
let yesSize=1

const text=document.getElementById("text")
const yes=document.getElementById("yes")
const alt=document.getElementById("alt")
const island=document.getElementById("island")

const yesMessages=[
"try saying no first. I bet you want to know what happens",
"go on, hit no… just once",
"you're missing out",
"click no… I dare you"
]

const altMessages=[
"Are you positive?",
"Baby please…",
"If you say no I will be really sad",
"I will be very sad",
"Please???"
]

yes.onclick=()=>{

if(step<yesMessages.length){

text.innerText=yesMessages[step]

yesSize+=0.3
yes.style.transform="scale("+yesSize+")"

sadAnim()

step++

}else{

showIsland()

}

}

alt.onclick=()=>{

let index=step-yesMessages.length

if(index>=0 && index<altMessages.length){

text.innerText=altMessages[index]

yesSize+=0.4
yes.style.transform="scale("+yesSize+")"

sadAnim()

step++

}else{

step=yesMessages.length

text.innerText=altMessages[0]

sadAnim()

}

}

function sadAnim(){

for(let i=0;i<3;i++){

let sad=document.createElement("div")
sad.className="sad"
sad.innerHTML="😢"
sad.style.left=Math.random()*100+"%"
document.body.appendChild(sad)

setTimeout(()=>sad.remove(),4000)

}

}

function showIsland(){

document.body.innerHTML=""
document.body.appendChild(island)

island.style.display="block"

}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"%"
document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)

},800)

</script>

</body>
</html>
