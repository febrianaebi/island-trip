<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Trip 🌴</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(to bottom,#a1c4fd,#c2e9fb);
overflow:hidden;
}

h1{
margin-top:80px;
font-size:2.2em;
color:#ff4f81;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
margin:12px;
transition:0.3s;
}

#yesBtn{
background:#ff4f81;
color:white;
}

#noBtn{
background:white;
}

#message{
margin-top:25px;
font-size:20px;
color:#ff4f81;
}

/* hearts */

.heart{
position:absolute;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* plane */

.plane{
position:absolute;
font-size:28px;
animation:fly 8s linear infinite;
}

@keyframes fly{
0%{left:-10%;top:20%;}
100%{left:110%;top:25%;}
}

/* island */

.island-img{
width:80%;
max-width:500px;
border-radius:20px;
margin-top:25px;
}

.destination{
margin-top:10px;
font-size:28px;
color:white;
}

.wave{
position:absolute;
bottom:80px;
left:0;
width:100%;
height:40px;
background:rgba(0,200,255,0.6);
animation:waveMove 3s infinite linear;
}

@keyframes waveMove{
0%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
100%{transform:translateX(-10px);}
}

</style>
</head>

<body>

<iframe width="0" height="0"
src="https://www.youtube.com/embed/76xtedFgWTA?autoplay=1&loop=1&playlist=76xtedFgWTA"
frameborder="0" allow="autoplay"></iframe>

<h1>Would you take me on a trip to an island? 🌴✈️</h1>

<div id="buttons">
<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>
</div>

<div id="message"></div>

<script>

let yesCount=0
let size=18
let stage=0

const yesBtn=document.getElementById("yesBtn")
const noBtn=document.getElementById("noBtn")
const message=document.getElementById("message")
const buttons=document.getElementById("buttons")

startHearts()
startPlane()

yesBtn.onclick=()=>{

if(stage<4){

yesCount++
size+=8
yesBtn.style.fontSize=size+"px"

if(stage==0){
message.innerText="try saying no first. I bet you want to know what happens"
}

if(stage==1){
message.innerText="go on, hit no… just once"
}

if(stage==2){
message.innerText="you're missing out"
}

if(stage==3){
message.innerText="click no… I dare you"
}

stage++

return
}

ending()

}

noBtn.onclick=()=>{

if(stage<4)return

stage=5

buttons.innerHTML=`
<button id="yesBtn">Yes</button>
<button id="altBtn">Are you positive?</button>
`

document.getElementById("yesBtn").onclick=ending
document.getElementById("altBtn").onclick=step2

}

function step2(){

buttons.innerHTML=`
<button id="yesBtn">Yes</button>
<button id="altBtn">Baby please…</button>
`

document.getElementById("yesBtn").onclick=ending
document.getElementById("altBtn").onclick=step3

}

function step3(){

buttons.innerHTML=`
<button id="yesBtn">Yes</button>
<button id="altBtn">If you say no I will be really sad</button>
`

document.getElementById("yesBtn").onclick=ending
document.getElementById("altBtn").onclick=step4

}

function step4(){

buttons.innerHTML=`
<button id="yesBtn">Yes</button>
<button id="altBtn">I will be very sad</button>
`

document.getElementById("yesBtn").onclick=ending
document.getElementById("altBtn").onclick=step5

}

function step5(){

buttons.innerHTML=`
<button id="yesBtn" style="font-size:32px;">YES</button>
<button id="runBtn">Please???</button>
`

document.getElementById("yesBtn").onclick=ending

const run=document.getElementById("runBtn")

run.onmouseover=()=>{

run.style.position="absolute"
run.style.left=Math.random()*80+"%"
run.style.top=Math.random()*80+"%"

}

}

function ending(){

message.innerText="Pack your bag, we’re going to island 🌴✈️"

buttons.innerHTML=`

<div class="wave"></div>

<img class="island-img"
src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

<h2 class="destination">Destination: Us 💙</h2>

`

}

function startHearts(){

setInterval(()=>{

const heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💖"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),5000)

},400)

}

function startPlane(){

setInterval(()=>{

const plane=document.createElement("div")

plane.className="plane"
plane.innerHTML="✈️"

document.body.appendChild(plane)

setTimeout(()=>plane.remove(),8000)

},5000)

}

</script>

</body>
</html>
